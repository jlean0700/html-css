<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
    
    <style>

        body {
            font-family: Arial;

        }

        table {
            width: 400px;
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            padding: 8px;
        }

        .linha1 {
            background-color: blue;
        }

        .a1 {
            background-color: gray;
        }

    </style>

</head>
<body>
    <h1>
        Minha primeira tabela!
    </h1>

    <!-- herarquia de tabelas (simples)
    table = tabela
    table row = linha de tabela
    table header = cabeçalho de tabela 
    table data = dado de tabela
    
    -->

    <table>
        <tr class="linha1"> <!-- primeira linha-->
            <td class="a1">A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>

        <tr>  <!-- segunda linha-->
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>

        <tr> <!-- terceira linha-->
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>

        <tr> <!--quarta linha-->
            <td> A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>

    </table>

    
</body>
</html>
